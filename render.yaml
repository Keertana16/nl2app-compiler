services:
  - type: web
    name: nl2app-compiler
    env: python
    buildCommand: pip install -r nl2app_deploy/nl2app/requirements.txt
    startCommand: cd nl2app_deploy/nl2app && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
